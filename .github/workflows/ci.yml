name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck (backend)
        run: bun run --filter './apps/backend' typecheck
        continue-on-error: true

      - name: Run backend tests
        run: bun run --filter './apps/backend' test
        env:
          ANTHROPIC_API_KEY: sk-ant-test-key-placeholder-for-ci
          DB_PATH: /tmp/velanza-test.db

      - name: Run shared package tests
        run: bun run --filter './packages/shared' test
